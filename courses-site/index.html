<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>أكاديمية البرمجة</title>
    <style>
        /* هذا هو التنسيق اللي بيخلي الموقع فخم */
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        header { background: #2c3e50; color: white; padding: 20px; text-align: center; border-radius: 10px; margin-bottom: 30px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .card { background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 280px; padding: 15px; text-align: center; }
        .card img { width: 100%; border-radius: 10px; height: 150px; object-fit: cover; }
        .btn { display: inline-block; background: #3498db; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; margin-top: 15px; font-weight: bold; }
        .btn:hover { background: #2980b9; }
    </style>
</head>
<body>

    <header>
        <h1>متجر الكورسات البرمجية</h1>
        <p>ابدأ رحلتك في عالم التقنية اليوم</p>
    </header>

    <div class="container">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1542831371-29b0f74f9713?w=400" alt="HTML">
            <h3>كورس HTML</h3>
            <p>أساسيات بناء هيكل المواقع.</p>
            <a href="course1.html" class="btn">عرض التفاصيل</a>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1507721999472-8ed4421c4af2?w=400" alt="CSS">
            <h3>كورس CSS</h3>
            <p>تصميم واجهات احترافية وأنيقة.</p>
            <a href="course1.html" class="btn">عرض التفاصيل</a>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1579468118864-1b9ea3c0db4a?w=400" alt="JS">
            <h3>كورس JavaScript</h3>
            <p>إضافة التفاعل والذكاء لموقعك.</p>
            <a href="course1.html" class="btn">عرض التفاصيل</a>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1587620962725-abab7fe55159?w=400" alt="UI">
            <h3>كورس UI/UX</h3>
            <p>تصميم تجربة مستخدم مثالية.</p>
            <a href="course1.html" class="btn">عرض التفاصيل</a>
        </div>
    </div>

</body>
</html>
